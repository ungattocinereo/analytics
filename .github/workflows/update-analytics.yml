name: Update Analytics Data

on:
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC = 07:00 Rome
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch GA data
        env:
          GA_SERVICE_ACCOUNT: ${{ secrets.GA_SERVICE_ACCOUNT }}
        run: node scripts/fetch-ga-data.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "📊 Update analytics data $(date +%Y-%m-%d)"
          git push

      - name: Trigger Vercel deploy
        if: success()
        run: |
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/${{ secrets.VERCEL_DEPLOY_HOOK }}" -H "Content-Type: application/json" -d '{}'
